name: Release

# 触发条件：
#   1. 推送形如 v1.0.0 的 tag 时，自动打包并创建 Release
#   2. 在 Actions 页面手动触发（workflow_dispatch），仅打包并上传构建产物，不发 Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 允许创建 Release / 上传附件
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 确定资源包文件名
        id: vars
        run: |
          # tag 触发时用 tag 名，手动触发时用短 commit 号
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zipname=HappyMC_Cinderworks_TranslatePack-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: 打包资源包
        run: |
          zip -r "${{ steps.vars.outputs.zipname }}" \
            assets pack.mcmeta LICENSE README.md \
            -x "*.DS_Store" "*/.git/*"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: HappyMC_Cinderworks_TranslatePack-${{ steps.vars.outputs.version }}
          path: ${{ steps.vars.outputs.zipname }}

      - name: 创建 Release 并上传 zip
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vars.outputs.zipname }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
