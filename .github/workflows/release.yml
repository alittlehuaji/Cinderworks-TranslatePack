name: Release

# 触发条件：
#   1. 推送形如 v1.0.0 的 tag 时，自动打包并创建 Release（需符合语义化版本格式）
#   2. 在 Actions 页面手动触发（workflow_dispatch），仅打包并上传构建产物，不发 Release
#
# 语义化版本格式：v主版本.次版本.修订号[-预发布标签]
# 示例：v1.0.0, v1.2.3, v1.0.0-alpha, v1.0.0-beta.1
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

env:
  PACK_NAME: Cinderworks_TranslatePack
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}

# 允许创建 Release / 上传附件
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 打包资源包
        run: ./build.sh "${PACK_NAME}-${VERSION}.zip"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACK_NAME }}-${{ env.VERSION }}
          path: ${{ env.PACK_NAME }}-${{ env.VERSION }}.zip

      - name: 创建 Release 并上传 zip
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACK_NAME }}-${{ env.VERSION }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
